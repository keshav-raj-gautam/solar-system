name: Solar System Workflow
on:
    workflow_dispatch: 
    push:
        branches: 
            - main
            - 'features/*'
jobs:
    unit-testing:
        name: Unit Testing
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Setup NodeJS version - 18
              uses: actions/setup-node@v6
              with:
                node-version: 18

            - name: Install dependencies
              run: npm install
              
            - name: Run unit test
              run: npm test  
              
              

    