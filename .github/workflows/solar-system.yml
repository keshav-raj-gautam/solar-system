name: Solar System Workflow
on:
    workflow_dispatch: 
    push:
        branches: 
            - main
            - 'feature/*'

env:
    MONGO_URI: 'mongodb+srv://supercluster.d83jj.mongodb.net/superData'
    MONGO_USERNAME: ${{ vars.MONGO_USERNAME }}
    MONGO_PASSWORD: ${{secrets.MONGO_PASSWORD}}   

jobs:
    unit-testing:
        name: Unit Testing

        env:
         MONGO_URI: 'mongodb://localhost:27017/superData'
         MONGO_USERNAME: non-prod-user
         MONGO_PASSWORD: non-prod-password 
         
        strategy:
            fail-fast: false                        # Prevents github from cancelling in progress job if any matrix job fails
            # max-parallel: 1
            matrix:
              nodejs_version: [18, 19, 20]
              os: [ubuntu-latest]

              # exclude:
              #   - nodejs_version: 18
              #     os: macos-latest      
        
        runs-on: ${{matrix.os}}   
        services:
          mongo-db:
            image: siddharth67/mongo-db:non-prod
            ports: 
              - 27017:27017

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v6

            - name: Setup NodeJS version - ${{matrix.nodejs_version}}
              uses: actions/setup-node@v6
              with:
                node-version: ${{matrix.nodejs_version}}
 
            - name: cache npm dependencies
              uses: actions/cache@v5               # stores dependencies on cache to reduce job time
              with:
                path: node_modules
                key: ${{runner.os}}-node-modules-${{hashFiles('package-lock.json')}}

            - name: Install dependencies
              run: npm install
              
            - name: Run unit test
              run: npm test  

            # - name: Show generated files
            #   run: |
            #     find . -type f  
            # - name: Archive test result
            #   uses: actions/upload-artifact@v7
            #   with:
            #     name: Mocha-test-result
            #     path: test-results-${{matrix.nodejs_version}}-${{matrix.os}}.xml

    code-coverage:
        
        # needs: unit-testing
        name: Code Coverage
        runs-on: ubuntu-latest
        env:
         MONGO_URI: 'mongodb://mongo:27017/superData'
         MONGO_USERNAME: non-prod-user
         MONGO_PASSWORD: non-prod-password 

        container: 
          image: node:18

        services:
          mongo-db:
            image: siddharth67/mongo-db:non-prod  # No port mapping because it is cont-to-cont network
            options:
              --name mongo
        steps:
          - name: Checkout
            uses: actions/checkout@v6

          # - name: Setup Nodejs 
          #   uses: actions/setup-node@v6
          #   with:
          #       node-version: 18

          - name: cache npm dependencies
            uses: actions/cache@v5
            with:
                path: node_modules
                key: ${{runner.os}}-node-modules-${{hashFiles('package-lock.json')}}

          - name: Install dependencies
            run: npm install  

          - name: Check code coverage
            continue-on-error: true
            run: npm run coverage  
                
          - name: Upload artifact
            uses: actions/upload-artifact@v7
            with:
                name: Code-coverage-result
                path: coverage
                retention-days: 5  

    docker:
      needs: [unit-testing, code-coverage]
      name: Containerization
      permissions: 
        packages: write
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v6

        - name: Docker login
          uses: docker/login-action@v4
          with:
            username: ${{vars.DOCKERHUB_USERNAME}}
            password: ${{secrets.DOCKERHUB_PASSWORD}}

        - name: GHCR login
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{github.repository_owner}}
            password: ${{secrets.GITHUB_TOKEN}}    

        - name: Docker build
          uses: docker/build-push-action@v7
          with: 
            push: false
            context: .
            tags: ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}

        - name: Docker Image testing
          run: |
           docker images
           docker run --name solar-system-app -d \
           -p 3000:3000 \
           -e MONGO_URI=$MONGO_URI \
           -e MONGO_USERNAME=$MONGO_USERNAME \
           -e MONGO_PASSWORD=$MONGO_PASSWORD \
           ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}} 

           export IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' solar-system-app)
           echo $IP
           wget -q -O - 127.0.0.1:3000/live | grep live 

        - name: Container registry Push
          uses: docker/build-push-action@v7
          with: 
            push: true
            context: .
            tags: |
              ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}  
              ghcr.io/${{github.repository_owner}}/solar-system:${{github.sha}}
            
    dev-deploy:

      needs: docker
      environment: 
        name: development
        url: https://${{steps.set-ingress-host-address.outputs.APP_INGRESS_HOST}}

      outputs: 
        APP_INGRESS_URL: ${{steps.set-ingress-host-address.outputs.APP_INGRESS_HOST}}
      name: Dev Deployment
      runs-on: ubuntu-latest
      steps:
        
        - name: Checkout
          uses: actions/checkout@v6

        - name: Install kubectl
          uses: azure/setup-kubectl@v4
          with:
            version: 'v1.26.0'
          id: install  
        
        - name: Set Kubeconfig
          uses: azure/k8s-set-context@v4
          with:
            method: kubeconfig
            kubeconfig: ${{secrets.KUBECONFIG}}  

        - name: Fetch Cluster details
          run: |
           kubectl version --short 
           echo "--------------------------------------------"
           kubectl get nodes  
        
        - name: Fetch Ingress IP
          run: echo "INGRESS_IP=$(kubectl get svc ingress-nginx-controller -n ingress-nginx -o jsonpath='{.status.loadBalancer.ingress[0].ip}')" >> $GITHUB_ENV

        - name: replace tokens in manifest
          uses: cschleiden/replace-tokens@v1
          with:
            tokenPrefix: '${'
            tokenSuffix: '}'
            files: '["kubernetes/development/*.yaml"]'
          env:
            NAMESPACE: ${{vars.NAMESPACE}}
            REPLICAS: ${{vars.REPLICAS}}
            K8S_IMAGE: ${{vars.DOCKERHUB_USERNAME}}/solar-system:${{github.sha}}
            INGRESS_IP: ${{env.INGRESS_IP}}

        - name: Check manifest
          run: cat kubernetes/development/*.yaml  

        - name: Create Namespace
          run: |
            kubectl create namespace ${{ vars.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f - 

        - name: Create MongoDB secret
          run: |
            kubectl -n ${{vars.NAMESPACE}} create secret generic mongo-db-creds \
            --from-literal=MONGO_URI=${{env.MONGO_URI}} \
            --from-literal=MONGO_USERNAME=${{env.MONGO_USERNAME}} \
            --from-literal=MONGO_PASSWORD=${{secrets.MONGO_PASSWORD}} \
            --save-config \
            --dry-run=client \
            -o yaml | kubectl apply -f-

        - name: Deploy to DEV env
          run: |
            kubectl apply -f kubernetes/development

        - name: Set app ingress host
          id: set-ingress-host-address
          run: echo "APP_INGRESS_HOST=$(kubectl -n ${{vars.NAMESPACE}} get ingress -o jsonpath="{.items[0].spec.tls[0].hosts[0]}")" >> $GITHUB_OUTPUT 
    
    Intergration-test:
      name: Dev Integration Test
      needs: dev-deploy
      runs-on: ubuntu-latest
      steps:
       - name: Test URL output using curl and JQ
         env:
          URL: ${{needs.dev-deploy.outputs.APP_INGRESS_URL}}
         run: |
           echo $URL
           echo "----------------------------------------------------"
           curl https://$URL/live -s -k | jq -r .status | grep -i live




